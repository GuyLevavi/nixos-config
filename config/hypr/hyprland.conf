# ~/.config/hypr/hyprland.conf
# Loaded via wayland.windowManager.hyprland.extraConfig in home/gui.nix.
# Catppuccin Mocha color variables ($mauve, $blue, $overlay0, $base, etc.)
# are injected by catppuccin.hyprland.enable = true before this content.

# ── Environment variables ──────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = OZONE_PLATFORM,wayland

# ── Monitor ───────────────────────────────────────────────────────────
# Auto-detect. Replace with specific config if needed:
# monitor = DP-1, 1920x1080@60, 0x0, 1
monitor = , preferred, auto, 1

# ── Input ─────────────────────────────────────────────────────────────
input {
    kb_layout    = us,il
    kb_variant   = ,       # empty variant for Hebrew (standard layout)
    kb_model     = pc105   # prevents xkbcomp "multiply defined" warnings from XWayland
    kb_options   = grp:alt_shift_toggle   # Alt+Shift toggles us ↔ il
    follow_mouse = 1
    sensitivity  = 0
    touchpad {
        natural_scroll = false
    }
}

# ── General ───────────────────────────────────────────────────────────
general {
    gaps_in          = 4
    gaps_out         = 8
    border_size      = 2
    col.active_border   = $mauve $blue 45deg
    col.inactive_border = $overlay0
    layout           = dwindle
    resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────────────────
decoration {
    rounding         = 10
    active_opacity   = 1.0
    inactive_opacity = 0.93
    dim_inactive     = true
    dim_strength     = 0.05

    blur {
        enabled           = true
        size              = 4
        passes            = 4
        new_optimizations = true
        xray              = true   # blur shows through waybar/rofi correctly
    }

    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(1e1e2e99)
    }
}

# ── Animations ────────────────────────────────────────────────────────
# Bezier curves inspired by Material Design 3 motion spec (credit: ML4W / end-4).
animations {
    enabled = true

    bezier = md3_decel,  0.05, 0.7,  0.1, 1.0
    bezier = md3_accel,  0.3,  0.0,  0.8, 0.15
    bezier = menu_decel, 0.1,  1.0,  0.0, 1.0
    bezier = menu_accel, 0.38, 0.04, 1.0, 0.07
    bezier = overshot,   0.05, 0.9,  0.1, 1.1

    animation = windows,        1, 3,   md3_decel,  popin 60%
    animation = windowsIn,      1, 3,   md3_decel,  popin 60%
    animation = windowsOut,     1, 3,   md3_accel,  popin 60%
    animation = border,         1, 10,  default
    animation = fade,           1, 3,   md3_decel
    animation = layersIn,       1, 3,   menu_decel, slide
    animation = layersOut,      1, 2,   menu_accel
    animation = fadeLayersIn,   1, 2,   menu_decel
    animation = fadeLayersOut,  1, 4,   menu_accel
    animation = workspaces,     1, 6,   menu_decel, slide
    animation = specialWorkspace, 1, 3, md3_decel,  slidevert
}

# ── Layout: dwindle (binary tree) ─────────────────────────────────────
# pseudotile: windows can be toggled between tiled and pseudo-floating.
# preserve_split: split direction is remembered when focus moves away.
dwindle {
    pseudotile     = true
    preserve_split = true
    force_split    = 2     # always split to the right/bottom (new window opens beside current)
}

# master is kept available; switch default via general.layout if desired.
master {
    new_status  = slave
    orientation = left
}

# ── Binds ─────────────────────────────────────────────────────────────
binds {
    allow_workspace_cycles = true   # Super+Tab wraps 4 → 1
}

# ── Misc ──────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    focus_on_activate       = true
}

# ── Autostart ─────────────────────────────────────────────────────────
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = swayosd-server
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = wl-clip-persist --clipboard both
exec-once = wallpaper-init                  # restore last wallpaper from ~/.config/hypr/.wallpaper_last

# ── Window rules ──────────────────────────────────────────────────────
# Using windowrulev2 (deprecated in 0.47 but still parsed; "windowrule" with
# class:/title: selectors errors in 0.54 because it expects bare regex only).
# Float common dialogs
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save File)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$
windowrulev2 = float, title:^(Confirm)(.*)$
windowrulev2 = float, title:^(Warning)(.*)$

# Float specific apps
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(pwvucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(org.keepassxc.KeePassXC)$
windowrulev2 = center, class:^(org.keepassxc.KeePassXC)$
windowrulev2 = size 900 600, class:^(org.keepassxc.KeePassXC)$

# Terminal opacity: active full, inactive dimmed
windowrulev2 = opacity 1.0 0.85, class:^(kitty)$

# Reduce blur overhead for opaque apps
windowrulev2 = noblur, class:^(kitty)$

# Immediate rendering for fullscreen (reduces tearing in games/video)
windowrulev2 = immediate, fullscreen:1

# ── Layer rules ───────────────────────────────────────────────────────────
# Blur behind rofi so transparent backgrounds show compositor blur.
# 0.54 layerrule syntax: no comma between rule and target.
# ignorezero skips blur on fully-transparent pixels (avoids artifacting).
layerrule = blur rofi
layerrule = ignorezero rofi

# ── Key bindings ──────────────────────────────────────────────────────
$mod = SUPER

# Window management
bind = $mod,       Q,        killactive
bind = $mod,       F,        fullscreen
bind = $mod,       T,        togglefloating
bind = $mod,       P,        pseudo                          # dwindle pseudotile toggle
bind = $mod,       J,        layoutmsg, togglesplit          # dwindle: toggle split direction

# Applications
bind = $mod,       Return,   exec, kitty
bind = $mod,       Space,    exec, pkill rofi || rofi -show drun
bind = $mod,       B,        exec, google-chrome-stable
bind = $mod,       E,        exec, thunar
bind = $mod,       V,        exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod,       W,        exec, wallpaper-select             # rofi wallpaper picker

# Session
bind = $mod SHIFT, L,        exec, hyprlock
bind = $mod SHIFT, E,        exec, wlogout
bind = $mod SHIFT, N,        exec, swaync-client -t

# Move focus (vim-style hjkl)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
# $mod J is used for togglesplit above; use arrow keys or remapped keys for down-focus
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r

# Move windows
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Resize (hold mod+alt)
binde = $mod ALT, H,     resizeactive, -30 0
binde = $mod ALT, L,     resizeactive,  30 0
binde = $mod ALT, K,     resizeactive,  0 -30
binde = $mod ALT, J,     resizeactive,  0  30
binde = $mod ALT, left,  resizeactive, -30 0
binde = $mod ALT, right, resizeactive,  30 0
binde = $mod ALT, up,    resizeactive,  0 -30
binde = $mod ALT, down,  resizeactive,  0  30

# Workspaces: 1–4
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4

# Workspace cycling (wraps due to allow_workspace_cycles = true)
bind = $mod,       Tab,       workspace, m+1
bind = $mod SHIFT, Tab,       workspace, m-1

# Mouse workspace scroll
bind  = $mod, mouse_down, workspace, e+1
bind  = $mod, mouse_up,   workspace, e-1

# Alt+Tab window cycle
bind = ALT,       Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

# Mouse window control
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = ,           Print,   exec, grim -g "$(slurp)" - | wl-copy --type image/png
bind = $mod,       Print,   exec, grim - | wl-copy --type image/png
bind = $mod SHIFT, S,       exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# ── Media / function keys ─────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise --max-volume 100
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bind   = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind   = , XF86AudioPlay,         exec, playerctl play-pause
bind   = , XF86AudioNext,         exec, playerctl next
bind   = , XF86AudioPrev,         exec, playerctl previous
