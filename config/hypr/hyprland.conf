# ~/.config/hypr/hyprland.conf
# Loaded via wayland.windowManager.hyprland.extraConfig in home.nix.
# Catppuccin Mocha color variables ($mauve, $blue, $overlay0, etc.) are
# injected by catppuccin.hyprland.enable = true before this content.

# ── Monitor ───────────────────────────────────────────────────────────
# Auto-detect. Replace with specific config if needed:
# monitor=DP-1,1920x1080@60,0x0,1
monitor=,preferred,auto,1

# ── Input ─────────────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_model  = pc105   # prevents xkbcomp "multiply defined" warnings from XWayland
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# ── General ───────────────────────────────────────────────────────────
general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 2
    col.active_border   = $mauve $blue 45deg
    col.inactive_border = $overlay0
    layout = dwindle
    resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────────────────
decoration {
    rounding = 8
    active_opacity   = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
        size    = 6
        passes  = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range   = 12
        render_power = 3
        color   = rgba(1e1e2ecc)
    }
}

# ── Animations ────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = snappy, 0.05, 0.9, 0.1, 1.05
    bezier = linear,  0.0,  0.0, 1.0, 1.0
    animation = windows,    1, 4,  snappy
    animation = windowsOut, 1, 4,  default, popin 80%
    animation = fade,       1, 4,  default
    animation = workspaces, 1, 5,  default
}

# ── Layout ────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

# ── Misc ──────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

# ── Autostart ─────────────────────────────────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = swww-daemon
exec-once = swww img ~/wallpapers/flatppuccin_4k_macchiato.png --transition-type fade
exec-once = nm-applet --indicator
exec-once = swayosd-server          # OSD daemon for volume/brightness popups
exec-once = hypridle
exec-once = wl-paste --watch cliphist store  # clipboard history daemon
exec-once = wl-clip-persist --clipboard both # persist clipboard when source app closes

# ── Key bindings ($mod = Super/Windows key) ───────────────────────────
$mod = SUPER

bind = ALT, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

bind = $mod,       Return,   exec, kitty
bind = $mod,       Q,        killactive
bind = $mod SHIFT, M,        exit
bind = $mod,       Space,    exec, wofi --show drun
bind = $mod,       F,        fullscreen
bind = $mod,       P,        pseudo      # dwindle pseudotile
bind = $mod,       T,        togglesplit # dwindle
bind = $mod SHIFT, L,        exec, hyprlock  # lock screen
bind = $mod SHIFT, E,        exec, wlogout   # power/logout menu
bind = $mod,       V,        exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mod,       B,        exec, google-chrome-stable
bind = $mod,       E,        exec, thunar

# Move focus (vim-style)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize (hold mod + alt + hjkl)
binde = $mod ALT, H, resizeactive, -30 0
binde = $mod ALT, L, resizeactive,  30 0
binde = $mod ALT, K, resizeactive,  0 -30
binde = $mod ALT, J, resizeactive,  0  30

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = ,           Print,   exec, grim -g "$(slurp)" - | wl-copy --type image/png
bind = $mod,       Print,   exec, grim - | wl-copy --type image/png              # full screen
bind = $mod SHIFT, S,       exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png  # save to file

# ── Media / function keys ─────────────────────────────────────────────
# swayosd-client shows a popup OSD and then calls the underlying tool.
# --max-volume 100 prevents accidental over-amplification above 100%.
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise --max-volume 100
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bind   = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind   = , XF86AudioPlay,         exec, playerctl play-pause
bind   = , XF86AudioNext,         exec, playerctl next
bind   = , XF86AudioPrev,         exec, playerctl previous
